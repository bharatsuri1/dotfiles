# sesh — smart tmux session manager
# Docs: https://github.com/joshmedeski/sesh
# Schema: https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

# Use last 2 path components for session names so
# ~/code/github/acme/api-server -> "acme/api-server"
# (disambiguates repos with similar basenames, e.g. api-server vs api-client)
dir_length = 2

# Drop noisy / throwaway sessions from the picker.
# Surface blacklisted on demand with `sesh list -b`.
blacklist = ["scratch", "tmp", "0"]

# Pick order: live tmux sessions first, then curated configs,
# then zoxide's frecency list for everything else.
sort_order = ["tmux", "config", "zoxide"]

# ---------------------------------------------------------------------------
# Built-in picker (used when you run `sesh connect` with no args)
# ---------------------------------------------------------------------------
[tui]
prompt       = "⚡ "
placeholder  = "Jump to a session…"
show_icons   = true

# ---------------------------------------------------------------------------
# Defaults applied to every session
# New sessions land in a plain shell at the session's CWD.
# ---------------------------------------------------------------------------
[default_session]
preview_command = "eza -la --git --icons --color=always --group-directories-first {}"

# ═══════════════════════════════════════════════════════════════════════════════
# SESSION CONFIGS — Development Workflow
# ═══════════════════════════════════════════════════════════════════════════════
#
# Layout Philosophy:
#   • "projects" — landing session, general
#   • "code" — main working session (active repos)
#   • "dotfiles" — edit this dotfiles repo
#   • "notes" / "research" — plans, design docs, explorations
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── Projects Home Base ───────────────────────────────────────────────────────
# Landing session — general work, not tied to a single repo.
[[session]]
name = "projects"
path = "~/projects"
preview_command = "cd ~/projects && eza -la --icons --git-ignore --group-directories-first | head -15"

# ── Main Workspace ───────────────────────────────────────────────────────────
# Active repos, tools, scratch.
[[session]]
name = "code"
path = "~/projects/code"
preview_command = "cd ~/projects/code && eza -la --icons --git-ignore --group-directories-first | head -15"

# ── Dotfiles & Config ────────────────────────────────────────────────────────
# Edit dotfiles, tmux config, sesh config, etc.
[[session]]
name = "dotfiles"
path = "~/projects/dotfiles"
preview_command = "cd ~/projects/dotfiles && git log --oneline -5 && echo '\n─── structure ───' && eza --tree --level=2 --icons --git-ignore"

# ── Notes & Research ─────────────────────────────────────────────────────────
# Plans, design docs, scratch work that doesn't belong in a repo.
[[session]]
name = "notes"
path = "~/projects/notes"
preview_command = "cd ~/projects/notes 2>/dev/null && eza -la --icons --sort=modified | head -15 || echo 'Notes directory'"

# Research, explorations, prototypes.
[[session]]
name = "research"
path = "~/projects/research"
preview_command = "cd ~/projects/research 2>/dev/null && eza -la --icons --sort=modified | head -15 || echo 'Research directory'"
