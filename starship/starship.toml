"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$git_branch$git_status$custom$jobs$direnv\
$line_break$character """

# Keep prompt latency bounded in very large repositories.
# Git status/diff-style modules can walk large worktrees; keep the prompt to
# cheap metadata by default and let Git itself handle deeper inspection.
command_timeout = 500
scan_timeout = 10

palette = 'rose_pine'

[palettes.rose_pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
base = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
text = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
dusty_peach = '#d4a087'
pale_mint = '#a3d4c7'

[directory]
style = "fg:rosewater"
format = "[’ü╝  $path]($style)"
fish_style_pwd_dir_length = 1
truncation_length = 2
truncate_to_repo = false
home_symbol = "~"


[git_branch]
symbol = "’Éś"
style = "fg:iris"
format = "  [ŌŚÅ](fg:#6b9e94)  [$symbol $branch]($style)"

[git_status]
disabled = true
style = "fg:subtext1"
format = "[ ($all_status$ahead_behind )]($style)"

[custom.git_modified]
# Fast tracked-file modification marker for large repos.
# Shows only when tracked files have unstaged modifications.
# Icon options: Ņ░ī  ’æĆ  ’ōÆ  ’üä  ¾░Ęē  ¾░Å½  ¾▒ć¦  ’æÖ  ¾░łÖ
when = "git diff --no-ext-diff --quiet --ignore-submodules --exit-code; test $? -eq 1"
command = "printf '’æĆ'"
style = "fg:gold"
format = "  [$output]($style)"

[custom.git_stash]
# Fast stash marker. Checks only whether refs/stash exists; does not enumerate entries.
# Icon options: Ņ░ŗ  ¾░åō  ’Æć  ¾░ÅŚ  ¾░£”  ’åć  ’æĪ
when = "git rev-parse --verify --quiet refs/stash >/dev/null"
command = "printf '’ōÆ'"
style = "fg:foam"
format = "  [$output]($style)"


[character]
disabled = false
success_symbol = '[’É▓](bold fg:rosewater)'
error_symbol = '[’É▓](bold fg:love)'
vimcmd_symbol = '[’É┤](bold fg:dusty_peach)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:love)'
vimcmd_replace_symbol = '[’É┤](bold fg:love)'
vimcmd_visual_symbol = '[’É┤](bold fg:lavender)'


[jobs]
symbol = ""
style = "fg:#b8975a"
number_threshold = 1
format = '  [\[$number\]]($style)'

[direnv]
disabled = false
style = "fg:#b8975a"
format = "  [’ā¼ $loaded]($style)"
allowed_msg = ""
denied_msg = "Ō£Ś"
loaded_msg = "env"
unloaded_msg = ""

[git_metrics]
# Disabled because it computes diff metrics, which is one of the easiest ways
# for a prompt to become slow in large monorepos.
disabled = true
added_style = "fg:pine"
deleted_style = "fg:love"
only_nonzero_diffs = true
format = "([+$added]($added_style) )([-$deleted]($deleted_style))"
