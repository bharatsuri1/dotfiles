"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$git_branch$git_status$git_metrics$jobs$direnv\
$line_break$character """

palette = 'rose_pine'

[palettes.rose_pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
base = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
text = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
dusty_peach = '#d4a087'
pale_mint = '#a3d4c7'

[directory]
style = "fg:rosewater"
format = "[  $path]($style)"
fish_style_pwd_dir_length = 1
truncation_length = 2
truncate_to_repo = false
home_symbol = "~"


[git_branch]
symbol = ""
style = "fg:iris"
format = "  [●](fg:#6b9e94)  [$symbol $branch]($style)"

[git_status]
style = "fg:subtext1"
format = "[ ($all_status$ahead_behind )]($style)"


[character]
disabled = false
success_symbol = '[](bold fg:rosewater)'
error_symbol = '[](bold fg:love)'
vimcmd_symbol = '[](bold fg:dusty_peach)'
vimcmd_replace_one_symbol = '[](bold fg:love)'
vimcmd_replace_symbol = '[](bold fg:love)'
vimcmd_visual_symbol = '[](bold fg:lavender)'


[jobs]
symbol = ""
style = "fg:#b8975a"
number_threshold = 1
format = '  [\[$number\]]($style)'

[direnv]
disabled = false
style = "fg:#b8975a"
format = "  [ $loaded]($style)"
allowed_msg = ""
denied_msg = "✗"
loaded_msg = "env"
unloaded_msg = ""

[git_metrics]
disabled = false
added_style = "fg:pine"
deleted_style = "fg:love"
only_nonzero_diffs = true
format = "([+$added]($added_style) )([-$deleted]($deleted_style))"
