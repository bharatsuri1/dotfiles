# ── Terminal & Prefix ──────────────────────────────────────────
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 50000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g focus-events on
# Time window (ms) to accept repeatable keys after one prefix
set -g repeat-time 400
set -g extended-keys on
set -g extended-keys-format csi-u

# ── Reload ────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind R respawn-pane -k -c "#{pane_current_path}"

# ── Markdown Preview (glow in split) ─────────────────────────
bind M display-popup -E -w 60% -h 50% -d '#{pane_current_path}' "fd -e md . 2>/dev/null | gum filter --placeholder 'pick a markdown file...' | xargs -I{} tmux split-window -h 'glow {} -p'"
bind m display-popup -E -w 60% -h 50% -d '#{pane_current_path}' "fd -e md . 2>/dev/null | gum filter --placeholder 'pick a markdown file...' | xargs -I{} tmux split-window -v 'glow {} -p'"

# ── Popups ────────────────────────────────────────────────────
bind C-g display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "lazygit"
bind C-t display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "zsh"
bind C-e display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "nvim"
bind C-p display-popup -E -w 85% -h 85% -d "#{pane_current_path}" "uvx marimo new"
bind C-c display-popup -E -w 50% -h 50% "~/.config/tmux/scripts/ai-picker.sh hsplit '#{pane_current_path}'"
bind C display-popup -E -w 50% -h 50% "~/.config/tmux/scripts/ai-picker.sh vsplit '#{pane_current_path}'"
bind W display-popup -E -w 50% -h 50% "~/.config/tmux/scripts/ai-picker.sh window '#{pane_current_path}'"

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind -N "last-session (via sesh)" Tab run-shell "sesh last"
# Prefix-free session navigation
bind -n M-s run-shell "sesh connect \"$(sesh list --icons | fzf-tmux -p 80%,70% --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' --bind 'tab:down,btab:up' --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' --preview-window 'right:55%' --preview 'sesh preview {}')\""
bind -n M-BSpace run-shell "sesh last"


# ── Vi Copy Mode ──────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# ── Pane Navigation (vim-style) ──────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# Prefix-free directional pane nav (Alt+Shift+h/j/k/l)
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R

# ── Pane Splitting (intuitive keys, in current directory) ────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# Prefix-free detach
bind -n M-d detach-client

# Prefix-free splitting
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# ── Pane Resizing ────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window Navigation ────────────────────────────────────────
bind -r C-h previous-window
bind -r C-l next-window

# ── Prefix-free Navigation ───────────────────────────────────
# Direct window jump
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Previous/next window
bind -n M-h previous-window
bind -n M-l next-window
# Toggle zoom
bind -n M-z resize-pane -Z
# Kill pane
bind -n M-w kill-pane
# New window in current directory
bind -n M-n new-window -c "#{pane_current_path}"
# Rename window with gum popup
bind -n M-r display-popup -E -w 40% -h 20% "name=$(gum input --placeholder 'window name...') && [ -n \"\$name\" ] && tmux rename-window \"\$name\""
# Last session
bind -n M-Tab run-shell "sesh last"

# ── Theme (Rosé Pine) ────────────────────────────────────────
set -g @rose_pine_variant 'main'

# Disable rose-pine's built-in right modules (we control layout below)
set -g @rose_pine_directory ''
set -g @rose_pine_date_time ''

# Windows show the running program (e.g. vim, node, zsh)
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_disable_active_window_menu 'on'

# Left side overrides are applied after TPM (see bottom of file)

# ── Battery & CPU styling ────────────────────────────────────
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_charge_tier7 '󰂁'
set -g @batt_icon_charge_tier6 '󰁿'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 '󰁺'
set -g @batt_icon_status_charged '󰂄'
set -g @batt_icon_status_charging '󰂄'
set -g @cpu_percentage_format "%2.0f%%"

# Right side: icon-left, even spacing, rose-pine palette
# Each module gets its own palette color: foam=battery, iris=cpu, muted=clock, gold=git, rose=dir
set -g @rose_pine_status_right_prepend_section ''
set -ag @rose_pine_status_right_prepend_section '#[fg=#9ccfd8] 󰁹 #{battery_percentage} #[default] '
set -ag @rose_pine_status_right_prepend_section '#[fg=#c4a7e7] 󰻠 #{cpu_percentage} #[default] '
set -ag @rose_pine_status_right_prepend_section '#[fg=#e0def4] 󰃰 %I:%M %p #[default] '
# set -ag @rose_pine_status_right_prepend_section '#(cd "#{pane_current_path}" 2>/dev/null || exit 0; p="$PWD"; pyroot=""; while [ "$p" != "/" ]; do if [ -f "$p/pyproject.toml" ] || [ -f "$p/requirements.txt" ] || [ -f "$p/setup.py" ] || [ -f "$p/setup.cfg" ] || [ -f "$p/.python-version" ] || [ -d "$p/.venv" ]; then pyroot="$p"; break; fi; p=$(dirname "$p"); done; [ -z "$pyroot" ] && exit 0; pybin=python3; [ -x "$pyroot/.venv/bin/python" ] && pybin="$pyroot/.venv/bin/python"; info=$("$pybin" -c "import os,sys; v=sys.version.split()[0]; env=os.path.basename(sys.prefix) if sys.prefix!=sys.base_prefix else \"system\"; print(f\"{env}@{v}\")" 2>/dev/null); [ -n "$info" ] && echo "#[fg=#89b4fa,bg=#26233a]  $info #[default] ")'
set -ag @rose_pine_status_right_prepend_section '#(cd "#{pane_current_path}" 2>/dev/null && git branch --show-current 2>/dev/null | xargs -I{} echo "#[fg=#f6c177,bold]  {} #[default] ")'

set -ag @rose_pine_status_right_prepend_section '#[fg=#ebbcba,bold] 󰉋 #(echo "#{pane_current_path}" | sed "s|$HOME|~|;s|.*/\(.*/[^/]*\)$|\1|") #[default]'

set -g status-right-length 160
set -g status-left-length 200

# ── Plugins ──────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'wfxr/tmux-fzf-url'

# ── Resurrect & Continuum ────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'   # disabled: prefer manual save/restore
set -g @continuum-save-interval '0'  # disable auto-save (0 = off)

# Tell TPM to use this directory for all plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'

# ── Post-theme overrides (after TPM so plugins don't clobber) ─

# Fade inactive panes: darker bg + muted text; active stays crisp
set -g window-style 'fg=#6e6a86,bg=#1f1d2e'
set -g window-active-style 'fg=#e0def4,bg=#191724'

# Uniform border color; green icon on active pane only
set -g pane-border-style 'fg=#403d52'
set -g pane-active-border-style 'fg=#403d52'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=#a3be8c]   #[default],}'

# Left status: plain icon + command; only icon background toggles on prefix 

set -g @left_icon_active '#[fg=#eb6f92]#[fg=#191724,bg=#eb6f92]   #[default]'
set -g @left_icon_inactive '#[fg=#a3be8c]#[fg=#191724,bg=#a3be8c]   #[default]'
set -g status-left "#{?client_prefix,#{E:@left_icon_active},#{E:@left_icon_inactive}}#[fg=#e0def4,bg=#45475a,bold] #S#[fg=#45475a,bg=default]#[fg=#e0def4] |#[default] "

# Window badges: subtle bg pills with gap between them
set -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#f6c177,bg=default"
# setw -g window-status-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a]#{?window_activity_flag, ,}#W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#c4a7e7,bold] #I#[fg=#c4a7e7,bg=default] #[default]"
setw -g window-status-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a] #W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#c4a7e7,bold] #I#[fg=#c4a7e7,bg=default] #[default]"

setw -g window-status-current-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a] #W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#f6c177,bold] #I#[fg=#f6c177,bg=default] #[default]"
setw -g window-status-separator " "

# ── Two-line status bar (must be last so plugins don't override) ──
set -g status 2
set -g status-format[0] '#{E:status-left}#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{E:status-right}'
set -g status-format[1] '#[fill=#191724]'

set-option -g status-position top

# setw -g window-status-current-format "#[fg=#9ccfd8,bg=default]#[fg=#191724,bg=#9ccfd8,bold] #I #{?window_activity_flag,󰖲 ,}#W#{?window_zoomed_flag,  ,} #[fg=#9ccfd8,bg=default]#[default]"
# Active window color variants (uncomment one to preview)
# Mauve Lounge
# setw -g window-status-current-format "#[fg=#c4a7e7,bg=default]#[fg=#191724,bg=#c4a7e7,bold] #I #{?window_activity_flag,󰖲 ,}#W#{?window_zoomed_flag,  ,} #[fg=#c4a7e7,bg=default]#[default]"
# Love Punch
# setw -g window-status-current-format "#[fg=#eb6f92,bg=default]#[fg=#191724,bg=#eb6f92,bold] #I #{?window_activity_flag,󰖲 ,}#W#{?window_zoomed_flag,  ,} #[fg=#eb6f92,bg=default]#[default]"
# Golden Hour
# setw -g window-status-current-format "#[fg=#f6c177,bg=default]#[fg=#191724,bg=#f6c177,bold] #I #{?window_activity_flag,󰖲 ,}#W#{?window_zoomed_flag,  ,} #[fg=#f6c177,bg=default]#[default]"
# Pine Night
# setw -g window-status-current-format "#[fg=#31748f,bg=default]#[fg=#e0def4,bg=#31748f,bold] #I #{?window_activity_flag,󰖲 ,}#W#{?window_zoomed_flag,  ,} #[fg=#31748f,bg=default]#[default]"
# Muted Soho Mint

# ── Scroll & Copy UX (post-TPM to override tmux-yank) ────────
# Drag-to-copy stays in copy mode, selection remains visible
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
# Click clears selection but stays in copy mode (preserves cursor positioning)
bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection
bind -T copy-mode-vi MouseUp1Pane send-keys -X clear-selection
# Keyboard yank also stays in copy mode
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"

# Scroll past bottom auto-exits copy mode (browser-like)
bind -T copy-mode-vi WheelDownPane if-shell -F "#{scroll_position}" "send-keys -X -N 1 scroll-down" "send-keys -X cancel"
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up

# Double-click word select, triple-click line select (copies without exiting)
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{pane_in_mode}" "" "copy-mode" \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{pane_in_mode}" "" "copy-mode" \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"

# Rosé Pine selection highlight (subtle, not the default yellow)
set -g mode-style "fg=#e0def4,bg=#403d52"

# ── tmux-thumbs (vimium-style hint copy) ─────────────────────
# Prefix + Space to activate hint mode — highlights URLs, paths, hashes, etc.
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && tmux display-message "Copied: {}"'
# Rosé Pine colors for hints
set -g @thumbs-fg-color '#e0def4'
set -g @thumbs-bg-color '#403d52'
set -g @thumbs-hint-fg-color '#191724'
set -g @thumbs-hint-bg-color '#f6c177'
set -g @thumbs-select-fg-color '#191724'
set -g @thumbs-select-bg-color '#eb6f92'

# ── tmux-fzf-url (quick URL opening) ─────────────────────────────────
# Prefix + u to fuzzy-find and open URLs from pane + scrollback
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-fzf-options '\
  -w 50% -h 50% \
  --multi -0 \
  --layout=reverse \
  --border=rounded \
  --border-label=" URLs " \
  --prompt="  " \
  --pointer="▶" \
  --marker="✓" \
  --no-scrollbar \
  --info=inline \
  --color=fg:#e0def4,bg:#191724,hl:#f6c177 \
  --color=fg+:#e0def4,bg+:#26233a,hl+:#f6c177 \
  --color=pointer:#eb6f92,marker:#31748f,border:#403d52 \
  --color=label:#9ccfd8,header:#908caa,info:#908caa \
  --color=prompt:#c4a7e7,spinner:#f6c177 \
  '

# ── extrakto (fzf scrollback search) ─────────────────────────────────
# Prefix + Tab to fuzzy-find anything in scrollback
set -g @extrakto_key 'tab'
set -g @extrakto_copy_key 'enter'       # enter copies to clipboard
set -g @extrakto_insert_key 'tab'        # tab inserts into pane
set -g @extrakto_filter_key 'ctrl-f'     # cycle: word → all → line → path → url
set -g @extrakto_fzf_tool 'fzf'
set -g @extrakto_clip_tool 'pbcopy'
set -g @extrakto_fzf_layout 'reverse'    # top-down results (matches your fzf style)
set -g @extrakto_split_direction 'p'     # use popup instead of split
set -g @extrakto_popup_size '80%,60%'    # matches your other popup sizes
set -g @extrakto_grab_area 'window full' # search all panes in current window
set -g @extrakto_filter_order 'word all line path url'
