# ── Terminal & Prefix ──────────────────────────────────────────
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 5000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom
set -g focus-events on
# Time window (ms) to accept repeatable keys after one prefix
set -g repeat-time 700

# ── Reload ────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Popups ────────────────────────────────────────────────────
bind C-g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind C-t display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh"
bind C-e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "nvim"
bind C-p display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "uvx marimo new"


# ── Vi Copy Mode ──────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Pane Navigation (vim-style) ──────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane Splitting (intuitive keys, in current directory) ────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Resizing ────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window Navigation ────────────────────────────────────────
bind -r C-h previous-window
bind -r C-l next-window

# ── Theme (Rosé Pine) ────────────────────────────────────────
set -g @rose_pine_variant 'main'

# Disable rose-pine's built-in right modules (we control layout below)
set -g @rose_pine_directory ''
set -g @rose_pine_date_time ''

# Windows show the running program (e.g. vim, node, zsh)
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_disable_active_window_menu 'on'

# Left side overrides are applied after TPM (see bottom of file)

# ── Battery & CPU styling ────────────────────────────────────
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_charge_tier7 '󰂁'
set -g @batt_icon_charge_tier6 '󰁿'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 '󰁺'
set -g @batt_icon_status_charged '󰂄'
set -g @batt_icon_status_charging '󰂄'
set -g @cpu_percentage_format "%2.0f%%"

# Right side: icon-left, even spacing, rose-pine palette
# Each module gets its own palette color: foam=battery, iris=cpu, muted=clock, gold=git, rose=dir
set -g @rose_pine_status_right_prepend_section ''
set -ag @rose_pine_status_right_prepend_section '#[fg=#9ccfd8] 󰁹 #{battery_percentage} #[default] '
set -ag @rose_pine_status_right_prepend_section '#[fg=#c4a7e7] 󰻠 #{cpu_percentage} #[default] '
set -ag @rose_pine_status_right_prepend_section '#[fg=#e0def4] 󰃰 %I:%M %p #[default] '
# set -ag @rose_pine_status_right_prepend_section '#(cd "#{pane_current_path}" 2>/dev/null || exit 0; p="$PWD"; pyroot=""; while [ "$p" != "/" ]; do if [ -f "$p/pyproject.toml" ] || [ -f "$p/requirements.txt" ] || [ -f "$p/setup.py" ] || [ -f "$p/setup.cfg" ] || [ -f "$p/.python-version" ] || [ -d "$p/.venv" ]; then pyroot="$p"; break; fi; p=$(dirname "$p"); done; [ -z "$pyroot" ] && exit 0; pybin=python3; [ -x "$pyroot/.venv/bin/python" ] && pybin="$pyroot/.venv/bin/python"; info=$("$pybin" -c "import os,sys; v=sys.version.split()[0]; env=os.path.basename(sys.prefix) if sys.prefix!=sys.base_prefix else \"system\"; print(f\"{env}@{v}\")" 2>/dev/null); [ -n "$info" ] && echo "#[fg=#89b4fa,bg=#26233a]  $info #[default] ")'
set -ag @rose_pine_status_right_prepend_section '#(branch=$(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null); [ -n "$branch" ] && echo "#[fg=#f6c177,bold]  $branch #[default] ")'
set -ag @rose_pine_status_right_prepend_section '#[fg=#ebbcba,bold] 󰉋 #{b:pane_current_path} #[default]'

set -g status-right-length 320
set -g status-left-length 200

# ── Plugins ──────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── Resurrect & Continuum ────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Tell TPM to use this directory for all plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'

# ── Post-theme overrides (after TPM so plugins don't clobber) ─

# Fade inactive panes: darker bg + muted text; active stays crisp
set -g window-style 'fg=#6e6a86,bg=#1f1d2e'
set -g window-active-style 'fg=#e0def4,bg=#191724'

# Active pane: gold border + index pill; inactive: muted border, no label
set -g pane-border-style 'fg=#403d52'
set -g pane-active-border-style 'fg=#f6c177'
set -g pane-border-status top

# Pane label variants (uncomment one):
# Minimal dot
# set -g pane-border-format '#{?pane_active,#[fg=#f6c177] ● #[default],}'
# Thin underline with window name
# set -g pane-border-format '#{?pane_active,#[fg=#f6c177]─ #W ─#[default],#[fg=#403d52]─#[default]}'
# Icon + command pill
# set -g pane-border-format '#{?pane_active,#[fg=#191724#,bg=#f6c177#,bold]  #W #[default],}'
# Command + directory
set -g pane-border-format '#{?pane_active,#[fg=#f6c177#,bg=default] ● #{pane_current_command} ─ #{b:pane_current_path} #[fg=#403d52#,bg=default],#[fg=#6e6a86#,bg=default] #{pane_current_command} ─ #{b:pane_current_path} #[fg=#403d52#,bg=default]}'

# Left status: plain icon + command; only icon background toggles on prefix 

set -g @left_icon_active '#[fg=#eb6f92]#[fg=#191724,bg=#eb6f92]   #[default]'
set -g @left_icon_inactive '#[fg=#a3be8c]#[fg=#191724,bg=#a3be8c]   #[default]'
set -g status-left "#{?client_prefix,#{E:@left_icon_active},#{E:@left_icon_inactive}}#[fg=#e0def4,bg=#45475a,bold] #S#[fg=#45475a,bg=default]#[fg=#e0def4] |#[default] "

# Window badges: subtle bg pills with gap between them
set -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#f6c177,bg=default"
# setw -g window-status-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a]#{?window_activity_flag, ,}#W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#c4a7e7,bold] #I#[fg=#c4a7e7,bg=default] #[default]"
setw -g window-status-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a] #W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#c4a7e7,bold] #I#[fg=#c4a7e7,bg=default] #[default]"

setw -g window-status-current-format "#[fg=#45475a]#[fg=#e0def4,bg=#45475a] #W #{?window_zoomed_flag, ,} #[fg=#191724,bg=#f6c177,bold] #I#[fg=#f6c177,bg=default] #[default]"
setw -g window-status-separator " "

# ── Three-line status bar (must be last so plugins don't override) ──
set -g status 3
set -g status-format[0] '#[fill=#191724]'
set -g status-format[1] '#{E:status-left}#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{E:status-right}'
set -g status-format[2] '#[fill=#191724]'

set-option -g status-position top

