# Alacritty Terminal Config — matched to Ghostty setup

[env]
TERM = "xterm-256color"

[general]
# Set to your primary workspace
# working_directory = "~/projects/code"

import = [
  "~/.config/alacritty/rose-pine.toml"
]

[window]
startup_mode = "Maximized"

# Padding — Ghostty uses 0 by default, but padding is nice in Alacritty
# since it has no tab bar or titlebar. Keep your 15x15 or set to 0 to match.
padding.x = 15
padding.y = 15
dynamic_padding = true

decorations = "None"       # Matches Ghostty: window-decoration = none
resize_increments = true   # Snap resize to cell boundaries for clean edges
option_as_alt = "Both"     # Treat Option as Alt so M-* tmux bindings work (Ghostty does this by default)
dynamic_title = false       # Matches Ghostty: title = " " (static blank title)
title = " "                 # Matches Ghostty: title = " "

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 14.0
offset = { x = 0, y = 1 }

[cursor]
# Matches Ghostty: cursor-style = block, cursor-style-blink = false
style.shape = "Block"
style.blinking = "Off"

blink_interval = 500
blink_timeout = 0

[mouse]
# Matches Ghostty: mouse-hide-while-typing = true
hide_when_typing = false

[selection]
save_to_clipboard = true

[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "O", mods = "Command|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`\\\\]+"

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\u001b\r" },

  # Font size
  { key = "Plus", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Command", action = "ResetFontSize" },

  # Window management
  { key = "N", mods = "Command|Shift", action = "CreateNewWindow" },
  { key = "Return", mods = "Command", action = "ToggleSimpleFullscreen" },

  # Search (essential for raw terminal usage without tmux)
  { key = "F", mods = "Command", action = "SearchForward" },
]
