# Alacritty config matched to ../ghostty/config
# Reference: https://alacritty.org/config-alacritty.html

[general]
import = ["themes/rose-pine.toml"]

live_config_reload = true

[window]
# Ghostty: maximize = true
startup_mode = "Maximized"

# QoL: add breathing room and keep resize steps aligned to terminal cells.
padding = { x = 8, y = 8 }
dynamic_padding = true
resize_increments = true

# QoL: make macOS Option behave as terminal Alt/Meta.
option_as_alt = "Both"

# Disable native decorations to avoid macOS rounded corners.
# Alacritty does not expose Ghostty's tab-style titlebar.
decorations = "None"
decorations_theme_variant = "Dark"

# Keep the background opaque; no blur.
opacity = 1.0
blur = false

[font]
# Ghostty: font-family = "JetBrainsMono Nerd Font", font-size = 14
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 14.0
builtin_box_drawing = true

[scrolling]
# QoL: larger scrollback and faster wheel/trackpad scrolling.
history = 50000
multiplier = 5

[selection]
# QoL: selected text is copied directly to the clipboard.
save_to_clipboard = true

[cursor]
# Ghostty: cursor-style = block, cursor-style-blink = false
style = { shape = "Block", blinking = "Never" }
unfocused_hollow = true
thickness = 0.2

[mouse]
# Ghostty: mouse-hide-while-typing = true
hide_when_typing = true
# QoL: right-click paste.
bindings = [
  { mouse = "Right", action = "Paste" },
]

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
# Ghostty: link-url = true
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "Command" }
binding = { key = "O", mods = "Control|Shift" }
regex = '(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^[:space:]<>"{}|\\^`]+'

[terminal]
# QoL: allow OSC52 copy/paste integration for SSH/tmux workflows.
# Alacritty has no direct equivalent for Ghostty's no-cursor/ssh-env/ssh-terminfo flags.
osc52 = "CopyPaste"

[keyboard]
# Ghostty: keybind = shift+enter=text:\x1b\r
bindings = [
  { key = "Enter", mods = "Shift", chars = "\u001b\r" },
]
